<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Independent Contractor Agreement — KIMANZI</title>
<link href="https://fonts.bunny.net/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1A2C1E; --orange: #C87A2E;
    --cream: #F5EFE2; --cream2: #EDE5D4;
    --text: #2A2418; --muted: #6B5A4A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", sans-serif; background: var(--cream); color: var(--text); font-size: 15px; line-height: 1.75; }

  /* CONCEPT WATERMARK */
  body::before {
    content: "CONCEPT";
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-35deg);
    font-family: "DM Sans", sans-serif;
    font-size: 18vw;
    font-weight: 700;
    color: rgba(200, 122, 46, 0.07);
    letter-spacing: .15em;
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
    user-select: none;
  }

  .conf-banner {
    background: var(--orange); color: #fff;
    text-align: center; padding: .6rem 2rem;
    font-size: 11px; letter-spacing: .15em; text-transform: uppercase; font-weight: 600;
  }

  .cover {
    background: var(--green); color: var(--cream);
    padding: 60px 60px 50px; position: relative; overflow: hidden;
  }
  .cover::before {
    content: "K"; position: absolute; right: -10px; top: -20px;
    font-family: "Playfair Display", serif; font-size: 260px;
    color: rgba(255,255,255,.04); line-height: 1; pointer-events: none;
  }
  .cover-label { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--orange); font-weight: 600; margin-bottom: 1rem; display: block; }
  .cover h1 { font-family: "Playfair Display", serif; font-size: clamp(28px,4vw,48px); font-weight: 700; line-height: 1.15; margin-bottom: .4rem; }
  .cover .sub { font-size: 16px; color: rgba(245,239,226,.6); font-style: italic; margin-bottom: 2rem; }
  .cover-meta { display: flex; gap: 2rem; flex-wrap: wrap; font-size: 13px; color: rgba(245,239,226,.5); border-top: 1px solid rgba(255,255,255,.1); padding-top: 1.25rem; }
  .cover-meta span strong { display: block; color: var(--cream); font-size: 14px; margin-bottom: .1rem; }

  .wrap { max-width: 820px; margin: 0 auto; padding: 0 2rem; }

  .warn-box {
    background: #FFF8F0; border: 1px solid rgba(200,122,46,.3);
    border-left: 4px solid var(--orange); border-radius: 0 8px 8px 0;
    padding: 1.1rem 1.4rem; margin: 2rem 0;
  }
  .warn-box strong { display: block; color: #7B5000; font-size: 14px; margin-bottom: .4rem; }
  .warn-box p { font-size: 13px; color: #6B5A4A; margin: 0; line-height: 1.65; }

  .concept-notice {
    background: rgba(200,122,46,.1); border: 1.5px solid var(--orange);
    border-radius: 8px; padding: 1.1rem 1.4rem; margin: 2rem 0;
    text-align: center;
  }
  .concept-notice strong { color: var(--orange); font-size: 13px; letter-spacing: .1em; text-transform: uppercase; display: block; margin-bottom: .3rem; }
  .concept-notice p { font-size: 13px; color: var(--muted); margin: 0; }

  .section { padding: 2.5rem 0 1.5rem; border-bottom: 1px solid var(--cream2); }
  .section:last-child { border-bottom: none; }

  .art-num { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--orange); font-weight: 600; margin-bottom: .35rem; display: block; }
  .art-title { font-family: "Playfair Display", serif; font-size: 24px; color: var(--green); font-weight: 700; margin-bottom: 1rem; }

  p { margin-bottom: .85rem; }
  p:last-child { margin-bottom: 0; }
  ul { padding-left: 1.4rem; margin-bottom: .85rem; }
  li { margin-bottom: .35rem; }
  li::marker { color: var(--orange); }

  .label { font-weight: 600; color: var(--text); }
  .muted { color: var(--muted); font-size: 13px; }

  .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin: 2rem 0; }
  .sig-header { background: var(--green); color: var(--cream); padding: .6rem 1rem; font-size: 13px; font-weight: 600; border-radius: 6px 6px 0 0; }
  .sig-body { border: 1px solid var(--cream2); border-top: none; border-radius: 0 0 6px 6px; padding: 1rem; }
  .sig-line { border-bottom: 1px solid var(--cream2); margin-bottom: .65rem; padding-bottom: .65rem; font-size: 13px; color: var(--muted); min-height: 2rem; }
  .sig-line:first-child { min-height: 3.5rem; }
  .sig-line:last-child { border-bottom: none; margin-bottom: 0; }

  .footer-conf { background: var(--green); color: rgba(245,239,226,.5); padding: 2rem; margin-top: 4rem; font-size: 12px; }
  .footer-conf .inner { max-width: 820px; margin: 0 auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .footer-conf .conf-title { color: var(--orange); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: .08em; display: block; margin-bottom: .5rem; }
  .footer-conf p { color: rgba(245,239,226,.5); margin-bottom: .3rem; }

  @media (max-width: 600px) {
    .cover { padding: 40px 24px 36px; }
    .sig-grid { grid-template-columns: 1fr; }
    .footer-conf .inner { grid-template-columns: 1fr; }
  }
  @media print {
    .conf-banner { position: fixed; top: 0; width: 100%; }
    .section { break-inside: avoid; }
    body::before { position: fixed; }
  }
</style>
</head>
<body>

<div class="conf-banner">⚠ CONCEPT — Not yet in force &nbsp;·&nbsp; KIMANZI &nbsp;·&nbsp; For review purposes only</div>

<div class="cover">
  <span class="cover-label">KIMANZI</span>
  <h1>Independent Contractor Agreement</h1>
  <p class="sub">Freelance Hospitality Host — Nairobi, Kenya</p>
  <div class="cover-meta">
    <span><strong>Version</strong>1.0 — CONCEPT</span>
    <span><strong>Not an employment agreement</strong>Independent contractor only</span>
    <span><strong>Jurisdiction</strong>Kenya</span>
    <span><strong>Contact</strong>host@kimanzi.nl</span>
  </div>
</div>

<!-- ACCESS CHECK -->
<script>
  (function(){
    const token = sessionStorage.getItem("kimanzi_token");
    const host  = sessionStorage.getItem("kimanzi_host");
    if(!token || !host){
      window.location.href = "portal.html";
    }
  })();
</script>

<!-- CONTENT IS LOADED VIA AUTHENTICATED API CALL — never present in static page source -->
<div id="docLoading" style="text-align:center;padding:4rem 1.5rem;color:#7a6a56;font-size:14px;">
  Loading…
</div>

<div id="docContent" style="display:none;"></div>

<script>
  (async function(){
    const API = "https://cockpit.urbanchill.org";
    const token = sessionStorage.getItem("kimanzi_token");
    if (!token) { window.location.href = "portal.html"; return; }

    try {
      const res = await fetch(API + "/api/host/contract?token=" + encodeURIComponent(token));
      const data = await res.json();
      if (data.success && data.html) {
        document.getElementById("docContent").innerHTML = data.html;
        document.getElementById("docContent").style.display = "block";
        document.getElementById("docLoading").style.display = "none";
      } else {
        window.location.href = "portal.html";
      }
    } catch(e) {
      document.getElementById("docLoading").textContent = "Connection error. Please refresh, or go back to the portal.";
    }
  })();
</script>

</body>
</html>
