<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#5a4332">

<title>KIMANZI Nairobi — Freelance Host Network | Privacy-First</title>

<meta name="description" content="KIMANZI collaborates with independent hospitality professionals in Nairobi. Structured host assignments, selection-based onboarding, privacy-first approach.">
<meta name="robots" content="index, follow">

<link rel="canonical" href="https://kimanzi.nl/">

<style>
/* styling exact behouden */
:root{
--bg-top:#5a4332;
--bg-mid:#4a3728;
--bg-bottom:#3a2b20;
--ink:#f7efe6;
--muted:#dccab7;
--amber:#d9a35a;
--amber-soft:#e8be84;
--card:#4a3728;
--card-light:#5a4332;
--border:rgba(255,255,255,.08);
--shadow-soft:0 12px 30px rgba(0,0,0,.25);
--maxw:1100px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
background:
radial-gradient(1000px 600px at 50% -5%, rgba(217,163,90,.12), transparent 60%),
linear-gradient(180deg,var(--bg-top),var(--bg-mid) 55%,var(--bg-bottom));
color:var(--ink);
line-height:1.7;
}

header{
padding:120px 20px 90px;
text-align:center;
border-bottom:1px solid var(--border);
}

main{
max-width:var(--maxw);
margin:auto;
padding:80px 20px;
}

details{
margin-bottom:36px;
padding:30px;
background:var(--card);
border-radius:22px;
border:1px solid var(--border);
box-shadow:var(--shadow-soft);
}

form{
margin-top:14px;
display:grid;
gap:12px;
max-width:780px;
}

input,textarea,select{
width:100%;
padding:12px 14px;
border-radius:14px;
border:1px solid var(--border);
background:rgba(255,255,255,.06);
color:var(--ink);
}

button{
width:max-content;
padding:12px 16px;
border-radius:14px;
border:1px solid var(--border);
background:var(--card-light);
color:var(--ink);
font-weight:700;
cursor:pointer;
}

.small{font-size:.9rem;color:var(--muted);}
</style>
</head>

<body>

<header>
<h1>KIMANZI Nairobi</h1>
<p class="small">Freelance Host Network — Privacy First</p>
</header>

<main>

<!-- CONTACT -->

<details id="contact" open>
<summary>Contact</summary>

<form id="contactForm">

<input type="text" id="c_name" placeholder="Full Name" required>
<input type="email" id="c_email" placeholder="Email" required>
<input type="tel" id="c_phone" placeholder="Phone (optional)">
<input type="text" id="c_topic" placeholder="Topic (optional)">
<textarea id="c_message" placeholder="Your message" required></textarea>

<button type="submit">Send message</button>
<span id="contactStatus" class="small"></span>

</form>

</details>


<!-- APPLY -->

<details id="apply">
<summary>Apply as Host</summary>

<form id="applyForm">

<input type="text" id="a_name" placeholder="Full Name" required>
<input type="tel" id="a_phone" placeholder="Phone" required>
<input type="email" id="a_email" placeholder="Email" required>
<input type="text" id="a_area" placeholder="Area in Nairobi" required>

<select id="a_independent_status" required>
<option value="">Independent status</option>
<option>Yes — I operate independently</option>
<option>In process</option>
<option>Not yet</option>
</select>

<textarea id="a_experience" placeholder="Experience"></textarea>

<select id="a_environment">
<option value="">Environment</option>
<option>Private guests</option>
<option>Corporate</option>
<option>Events</option>
<option>VIP</option>
</select>

<select id="a_availability" required>
<option value="">Availability</option>
<option>Weekdays</option>
<option>Weekends</option>
<option>Flexible</option>
</select>

<select id="a_mentorship">
<option value="">Mentorship</option>
<option>Yes</option>
<option>No</option>
<option>Unsure</option>
</select>

<label>
<input type="checkbox" id="a_independent_confirm" required>
I confirm I operate independently
</label>

<button type="submit">Submit Interest</button>
<span id="applyStatus" class="small"></span>

</form>

</details>

</main>

<footer class="small">
KIMANZI — Urbanchill — Nairobi — Privacy first
</footer>

<script>

const API = "https://cockpit.urbanchill.org";

async function postJson(url,payload){

const res = await fetch(url,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(payload)
});

return res.ok;

}

function setStatus(el,ok,msg){
if(!el) return;
el.textContent = msg;
el.style.color = ok ? "#e8be84" : "#dccab7";
}


/* CONTACT */

document.getElementById("contactForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const payload={
name:c_name.value.trim(),
email:c_email.value.trim(),
phone:c_phone.value.trim(),
topic:c_topic.value.trim(),
message:c_message.value.trim(),
source:"kimanzi-site-contact"
};

if(!payload.name || !payload.email || !payload.message){
setStatus(contactStatus,false,"Please complete required fields.");
return;
}

setStatus(contactStatus,true,"Sending...");

const ok = await postJson(API + "/api/contact",payload);

if(ok){
setStatus(contactStatus,true,"Message received. We respond within 1 day.");
this.reset();
}else{
setStatus(contactStatus,false,"Submission failed.");
}

});


/* HOST APPLY */

document.getElementById("applyForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const payload={
name:a_name.value.trim(),
phone:a_phone.value.trim(),
email:a_email.value.trim(),
area:a_area.value.trim(),
independent_status:a_independent_status.value,
experience:a_experience.value.trim(),
environment:a_environment.value,
availability:a_availability.value,
mentorship:a_mentorship.value,
independent_confirm:a_independent_confirm.checked,
source:"kimanzi-site-apply"
};

if(!payload.name || !payload.phone || !payload.email || !payload.area || !payload.independent_status || !payload.availability || !payload.independent_confirm){
setStatus(applyStatus,false,"Please complete required fields.");
return;
}

setStatus(applyStatus,true,"Submitting...");

const ok = await postJson(API + "/api/host-apply",payload);

if(ok){
setStatus(applyStatus,true,"Submission received. We respond within 1 day.");
this.reset();
}else{
setStatus(applyStatus,false,"Submission failed.");
}

});

</script>

</body>
</html>
