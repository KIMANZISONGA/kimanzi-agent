<script>
const API_BASE = "https://cockpit.urbanchill.org";

async function postJson(url, payload){
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch {}
  return { ok: res.ok, status: res.status, text, data };
}

function setStatus(el, ok, msg){
  if(!el) return;
  el.textContent = msg || "";
  el.style.color = ok ? "var(--gold-soft)" : "var(--muted)";
}

/* =========================
   CONTACT (FIXED)
========================= */
(function(){
  const form = document.getElementById("contactForm");
  const statusEl = document.getElementById("contactStatus");
  if(!form) return;

  form.addEventListener("submit", async function(e){
    e.preventDefault();

    const payload = {
      name: document.getElementById("c_name").value.trim(),
      email: document.getElementById("c_email").value.trim(),
      phone: document.getElementById("c_phone").value.trim(),
      topic: document.getElementById("c_topic").value.trim(),
      message: document.getElementById("c_message").value.trim(),
      source: "kimanzi-site-contact"
    };

    if(!payload.name || !payload.email || !payload.message){
      setStatus(statusEl, false, "Please complete the required fields.");
      return;
    }

    setStatus(statusEl, true, "Sending…");

    try {
      const r = await postJson(API_BASE + "/api/messages", payload);

      if(r.ok){
        setStatus(statusEl, true, "Message received. We respond within 1 day.");
        form.reset();
      } else {
        setStatus(statusEl, false, "The submission was not completed. Please try again shortly.");
      }

    } catch(err){
      console.error(err);
      setStatus(statusEl, false, "Network error. Please try again.");
    }
  });
})();
