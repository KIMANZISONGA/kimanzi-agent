<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Kimanzi — Nairobi-only. Apply to join our Host network or contact us. Privacy-first." />
  <title>KIMANZI — Hosts (Apply & Contact)</title>
  <style>
  /* --- STYLES ONGEWIJZIGD --- */
  /* (Exact jouw bestaande styling, niets aangepast) */
  </style>
</head>

<body>
<div class="container">

  <!-- NAV ONGEWIJZIGD -->
  <!-- HERO ONGEWIJZIGD -->
  <!-- ABOUT / WHAT / EXPECT ONGEWIJZIGD -->

  <!-- APPLY -->
  <section id="apply" class="card section">
    <h2>Apply as a Host</h2>
    <p class="muted">
      Keep it simple. Fill in the form — we’ll review it quietly. If there’s a match, we’ll reach out.
    </p>

    <form id="applyForm" novalidate>
      <div class="hp-wrap" aria-hidden="true">
        <label>Do not fill this field</label>
        <input name="company" tabindex="-1" autocomplete="off" />
      </div>

      <div class="formGrid">
        <div>
          <label for="a_name">Full name *</label>
          <input id="a_name" name="name" autocomplete="name" required />
        </div>

        <div>
          <label for="a_area">Area in Nairobi *</label>
          <input id="a_area" name="area" required />
        </div>

        <div>
          <label for="a_phone">Phone *</label>
          <input id="a_phone" name="phone" autocomplete="tel" required />
        </div>

        <div>
          <label for="a_email">Email *</label>
          <input id="a_email" name="email" type="email" autocomplete="email" required />
        </div>

        <div>
          <label for="a_languages">Languages</label>
          <input id="a_languages" name="languages" />
        </div>

        <div>
          <label for="a_availability">Availability pattern</label>
          <input id="a_availability" name="availability" />
        </div>

        <div>
          <label for="a_shadowing">Shadowing / training</label>
          <select id="a_shadowing" name="shadowing">
            <option value="no">No, I’m good</option>
            <option value="yes">Yes, I’d like shadowing/training</option>
            <option value="maybe">Maybe — let’s discuss</option>
          </select>
        </div>
      </div>

      <div style="margin-top:12px;">
        <label for="a_background">Short background (1–2 paragraphs)</label>
        <textarea id="a_background" name="background"></textarea>
        <div class="help">No CV needed. Just give us a clear picture of you.</div>
      </div>

      <div class="actions">
        <button class="btn btnPrimary" type="submit" id="applySubmit">Submit application</button>
        <button class="btn" type="button" id="applyReset">Reset</button>
        <span class="tiny">This form sends to <span class="kbd">POST /api/apply</span></span>
      </div>

      <div class="status" id="applyStatus" role="status" aria-live="polite"></div>
    </form>
  </section>

  <!-- CONTACT ONGEWIJZIGD -->
  <!-- FAQ ONGEWIJZIGD -->
  <!-- FOOTER ONGEWIJZIGD -->

</div>

<script>
(function(){

  const APPLY_ENDPOINT = "/api/apply";
  const CONTACT_ENDPOINT = "/api/contact";

  function setStatus(el,type,msg){
    el.className = "status show " + (type||"");
    el.textContent = msg;
  }
  function clearStatus(el){
    el.className="status";
    el.textContent="";
  }
  function disable(btn,yes){
    btn.disabled=!!yes;
    btn.style.opacity=yes?"0.72":"1";
    btn.style.cursor=yes?"not-allowed":"pointer";
  }

  async function postJson(url,payload){
    return fetch(url,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(payload)
    });
  }

  /* APPLY */
  const applyForm=document.getElementById("applyForm");
  const applyStatus=document.getElementById("applyStatus");
  const applySubmit=document.getElementById("applySubmit");
  const applyReset=document.getElementById("applyReset");

  applyReset.addEventListener("click",()=>{
    applyForm.reset();
    clearStatus(applyStatus);
  });

  applyForm.addEventListener("submit",async(e)=>{
    e.preventDefault();
    clearStatus(applyStatus);

    const fd=new FormData(applyForm);
    const hp=(fd.get("company")||"").toString().trim();
    if(hp){
      setStatus(applyStatus,"ok","Thanks — received.");
      applyForm.reset();
      return;
    }

    const payload=Object.fromEntries(fd.entries());

    if(!payload.name || !payload.area || !payload.phone || !payload.email){
      setStatus(applyStatus,"warn","Please fill in all required fields.");
      return;
    }

    disable(applySubmit,true);
    setStatus(applyStatus,"","Sending…");

    try{
      const res=await postJson(APPLY_ENDPOINT,{
        name:String(payload.name).trim(),
        area:String(payload.area).trim(),
        phone:String(payload.phone).trim(),
        email:String(payload.email).trim(),
        languages:String(payload.languages||"").trim(),
        availability:String(payload.availability||"").trim(),
        shadowing:String(payload.shadowing||"no").trim(),
        background:String(payload.background||"").trim(),
        source:"kimanzi-hosts-page",
        ts:Date.now()
      });

      if(res.ok){
        setStatus(applyStatus,"ok","Application received. We’ll review it quietly and get back to you if there’s a match.");
        applyForm.reset();
      }else{
        setStatus(applyStatus,"bad","Something went wrong on our side. Please try again shortly.");
      }
    }catch{
      setStatus(applyStatus,"bad","Network error. Please try again.");
    }finally{
      disable(applySubmit,false);
    }
  });

})();
</script>

</body>
</html>
