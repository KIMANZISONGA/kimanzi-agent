<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMANZI Host Training</title>
<link href="https://fonts.bunny.net/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1A2C1E; --green2: #2A4A32;
    --orange: #C87A2E; --cream: #F5EFE2;
    --cream2: #EDE5D4; --text: #2A2418;
    --muted: #6B5A4A; --light: #F9F5EE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", sans-serif; background: var(--cream); color: var(--text); font-size: 15px; line-height: 1.75; }

  .banner { background: var(--green); color: var(--cream); text-align: center; padding: .6rem 2rem; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; }

  .cover { background: var(--green); color: var(--cream); padding: 80px 60px 70px; position: relative; overflow: hidden; }
  .cover::before { content: "K"; position: absolute; right: -20px; top: -30px; font-family: "Playfair Display", serif; font-size: 320px; color: rgba(255,255,255,.04); line-height: 1; pointer-events: none; }
  .cover-label { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--orange); font-weight: 600; margin-bottom: 1.5rem; display: block; }
  .cover h1 { font-family: "Playfair Display", serif; font-size: clamp(36px,5vw,64px); font-weight: 700; line-height: 1.1; margin-bottom: .5rem; }
  .cover h2 { font-family: "Playfair Display", serif; font-size: clamp(18px,2.5vw,26px); font-weight: 400; color: rgba(245,239,226,.7); margin-bottom: 2.5rem; }
  .cover-meta { display: flex; gap: 2.5rem; flex-wrap: wrap; font-size: 13px; color: rgba(245,239,226,.6); border-top: 1px solid rgba(255,255,255,.1); padding-top: 1.5rem; }
  .cover-meta span strong { display: block; color: var(--cream); font-size: 14px; margin-bottom: .15rem; }

  .page-wrap { max-width: 860px; margin: 0 auto; padding: 0 2rem; }

  .toc { background: var(--cream2); border-left: 4px solid var(--orange); padding: 2rem 2.5rem; margin: 3rem 0; border-radius: 0 8px 8px 0; }
  .toc h3 { font-family: "Playfair Display", serif; font-size: 18px; color: var(--green); margin-bottom: 1rem; }
  .toc ol { padding-left: 1.2rem; color: var(--muted); font-size: 14px; line-height: 2.2; }
  .toc ol a { color: var(--green); text-decoration: none; font-weight: 500; }
  .toc ol a:hover { color: var(--orange); }

  .section { padding: 3rem 0 2rem; border-bottom: 1px solid var(--cream2); }
  .section:last-child { border-bottom: none; }

  .section-num { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--orange); font-weight: 600; margin-bottom: .4rem; display: block; }
  h1.section-title { font-family: "Playfair Display", serif; font-size: 32px; color: var(--green); font-weight: 700; margin-bottom: .5rem; }
  h2.sub-title { font-family: "Playfair Display", serif; font-size: 22px; color: var(--green2); font-weight: 600; margin: 2rem 0 .75rem; }
  h3.sub-sub { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--orange); font-weight: 600; margin: 1.5rem 0 .5rem; }

  p { margin-bottom: 1rem; }
  ul, ol { padding-left: 1.4rem; margin-bottom: 1rem; }
  li { margin-bottom: .4rem; }
  li::marker { color: var(--orange); }

  .scenario {
    background: var(--light); border: 1px solid var(--cream2);
    border-left: 4px solid var(--orange); border-radius: 0 8px 8px 0;
    padding: 1.25rem 1.5rem; margin: 1.5rem 0;
  }
  .scenario-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--orange); font-weight: 600; margin-bottom: .5rem; display: block; }
  .scenario p { margin-bottom: .5rem; font-size: 14px; }
  .scenario p:last-child { margin-bottom: 0; }

  .do-dont { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; }
  .do-box, .dont-box { padding: 1rem 1.25rem; border-radius: 8px; font-size: 14px; }
  .do-box { background: #EEF5EE; border: 1px solid #B8D4B8; }
  .dont-box { background: #FBF0EE; border: 1px solid #E8C4BC; }
  .do-box strong { color: #2A5A2A; display: block; margin-bottom: .4rem; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
  .dont-box strong { color: #8B3A2A; display: block; margin-bottom: .4rem; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
  .do-box ul, .dont-box ul { margin-bottom: 0; }

  .key-box { background: var(--green); color: var(--cream); padding: 1.5rem 2rem; border-radius: 8px; margin: 2rem 0; }
  .key-box h4 { font-family: "Playfair Display", serif; font-size: 18px; margin-bottom: .75rem; color: var(--orange); }
  .key-box p, .key-box li { color: rgba(245,239,226,.85); font-size: 14px; }
  .key-box li::marker { color: var(--orange); }

  .footer { background: var(--green); color: rgba(245,239,226,.5); padding: 2rem; margin-top: 4rem; font-size: 12px; }
  .footer .inner { max-width: 860px; margin: 0 auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .footer .ft { color: var(--orange); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: .08em; display: block; margin-bottom: .5rem; }

  @media (max-width: 600px) {
    .cover { padding: 50px 24px 40px; }
    .do-dont { grid-template-columns: 1fr; }
    .footer .inner { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="banner">KIMANZI &nbsp;·&nbsp; Host Training &nbsp;·&nbsp; Confidential</div>

<div class="cover">
  <span class="cover-label">KIMANZI Host Training</span>
  <h1>Working with Dutch Professionals</h1>
  <h2>A practical guide to delivering great hospitality in Nairobi</h2>
  <div class="cover-meta">
    <span><strong>For</strong>KIMANZI Hosts</span>
    <span><strong>Version</strong>1.0</span>
    <span><strong>Language</strong>English</span>
    <span><strong>Contact</strong>host@kimanzi.nl</span>
  </div>
</div>

<!-- ACCESS CHECK -->
<script>
  (function(){
    const token = sessionStorage.getItem("kimanzi_token");
    const host  = sessionStorage.getItem("kimanzi_host");
    if(!token || !host){
      window.location.href = "portal.html";
    }
  })();
</script>

<!-- CONTENT IS LOADED VIA AUTHENTICATED API CALL — never present in static page source -->
<div id="docLoading" style="text-align:center;padding:4rem 1.5rem;color:#7a6a56;font-size:14px;">
  Loading…
</div>

<div id="docContent" style="display:none;"></div>

<script>
  (async function(){
    const API = "https://api.urbanchill.org";
    const token = sessionStorage.getItem("kimanzi_token");
    if (!token) { window.location.href = "portal.html"; return; }

    try {
      const res = await fetch(API + "/api/host/training?token=" + encodeURIComponent(token));
      const data = await res.json();
      if (data.success && data.html) {
        document.getElementById("docContent").innerHTML = data.html;
        document.getElementById("docContent").style.display = "block";
        document.getElementById("docLoading").style.display = "none";
      } else {
        window.location.href = "portal.html";
      }
    } catch(e) {
      document.getElementById("docLoading").textContent = "Connection error. Please refresh, or go back to the portal.";
    }
  })();
</script>

</body>
</html>
