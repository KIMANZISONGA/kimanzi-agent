<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMANZI Host Handbook — Version 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:   #1A2C1E;
    --green2:  #2A4A32;
    --orange:  #C87A2E;
    --cream:   #F5EFE2;
    --cream2:  #EDE5D4;
    --text:    #2A2418;
    --muted:   #6B5A4A;
    --light:   #F9F5EE;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text);
    font-size: 15px;
    line-height: 1.75;
  }

  /* CONFIDENTIAL BANNER */
  .confidential-banner {
    background: var(--green);
    color: var(--cream);
    text-align: center;
    padding: .6rem 2rem;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* COVER */
  .cover {
    background: var(--green);
    color: var(--cream);
    padding: 80px 60px 70px;
    position: relative;
    overflow: hidden;
  }
  .cover::before {
    content: 'K';
    position: absolute;
    right: -20px;
    top: -30px;
    font-family: 'Playfair Display', serif;
    font-size: 320px;
    color: rgba(255,255,255,.04);
    line-height: 1;
    pointer-events: none;
  }
  .cover-label {
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--orange);
    font-weight: 600;
    margin-bottom: 1.5rem;
  }
  .cover h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: .5rem;
  }
  .cover h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 400;
    color: rgba(245,239,226,.7);
    margin-bottom: 2.5rem;
  }
  .cover-meta {
    display: flex;
    gap: 2.5rem;
    flex-wrap: wrap;
    font-size: 13px;
    color: rgba(245,239,226,.6);
    border-top: 1px solid rgba(255,255,255,.1);
    padding-top: 1.5rem;
  }
  .cover-meta span strong {
    display: block;
    color: var(--cream);
    font-size: 14px;
    margin-bottom: .15rem;
  }

  /* LAYOUT */
  .page-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  /* TOC */
  .toc {
    background: var(--cream2);
    border-left: 4px solid var(--orange);
    padding: 2rem 2.5rem;
    margin: 3rem 0;
  }
  .toc h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--green);
    margin-bottom: 1rem;
  }
  .toc ol {
    padding-left: 1.2rem;
    color: var(--muted);
    font-size: 14px;
    line-height: 2;
  }
  .toc ol a {
    color: var(--green);
    text-decoration: none;
    font-weight: 500;
  }
  .toc ol a:hover { color: var(--orange); }

  /* SECTIONS */
  .section {
    padding: 3rem 0 2rem;
    border-bottom: 1px solid var(--cream2);
  }
  .section:last-child { border-bottom: none; }

  h1.section-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--green);
    font-weight: 700;
    margin-bottom: .5rem;
    padding-top: .5rem;
  }
  .section-num {
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--orange);
    font-weight: 600;
    margin-bottom: .4rem;
    display: block;
  }
  h2.sub-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--green2);
    font-weight: 600;
    margin: 2rem 0 .75rem;
  }
  h3.sub-sub {
    font-size: 13px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--orange);
    font-weight: 600;
    margin: 1.5rem 0 .5rem;
  }

  p { margin-bottom: 1rem; color: var(--text); }

  ul, ol {
    padding-left: 1.4rem;
    margin-bottom: 1rem;
  }
  li { margin-bottom: .4rem; color: var(--text); }
  li::marker { color: var(--orange); }

  /* SERVICE CARDS */
  .service-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
    margin: 1.5rem 0;
  }
  .service-card {
    background: white;
    border: 1px solid var(--cream2);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    border-top: 3px solid var(--orange);
  }
  .service-card h4 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--green);
    margin-bottom: .25rem;
  }
  .service-card .price {
    font-size: 13px;
    color: var(--orange);
    font-weight: 600;
    margin-bottom: .75rem;
  }
  .service-card p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 0;
    line-height: 1.6;
  }

  /* CALLOUT */
  .callout {
    background: var(--green);
    color: var(--cream);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin: 1.5rem 0;
    font-size: 14px;
    line-height: 1.65;
  }
  .callout strong { color: var(--orange); }

  .callout-warn {
    background: rgba(200,122,46,.1);
    border: 1px solid rgba(200,122,46,.3);
    border-left: 4px solid var(--orange);
    border-radius: 0 8px 8px 0;
    padding: 1rem 1.25rem;
    margin: 1.25rem 0;
    font-size: 14px;
    color: var(--text);
  }

  /* RULE */
  .rule {
    background: var(--cream2);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin: 1.25rem 0;
    border-left: 4px solid var(--green2);
    font-size: 14px;
    color: var(--text);
    font-style: italic;
  }

  /* CONTACT BLOCK */
  .contact-block {
    background: var(--green);
    color: var(--cream);
    border-radius: 12px;
    padding: 2rem;
    margin: 2rem 0;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .contact-block h4 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: .25rem;
  }
  .contact-block p { color: rgba(245,239,226,.75); margin: 0; font-size: 13px; }
  .contact-block a { color: var(--orange); text-decoration: none; font-weight: 600; }

  /* FOOTER */
  .footer-confidential {
    background: var(--green);
    color: rgba(245,239,226,.6);
    padding: 2.5rem 2rem;
    margin-top: 4rem;
    font-size: 12px;
    line-height: 1.7;
  }
  .footer-confidential .conf-title {
    color: var(--orange);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-size: 11px;
    margin-bottom: .75rem;
    display: block;
  }
  .footer-confidential .footer-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
  }
  .footer-confidential p { color: rgba(245,239,226,.6); margin-bottom: .5rem; font-size: 12px; }

  /* PRINT */
  @media print {
    .confidential-banner { position: fixed; top: 0; width: 100%; }
    .cover { break-after: page; }
    .section { break-inside: avoid; }
  }

  @media (max-width: 600px) {
    .cover { padding: 50px 28px 44px; }
    .cover::before { font-size: 180px; }
    .page-wrap { padding: 0 1.25rem; }
    .footer-confidential .footer-inner { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<!-- ACCESS CHECK -->
<script>
  (function(){
    const token = sessionStorage.getItem("kimanzi_token");
    const host  = sessionStorage.getItem("kimanzi_host");
    if(!token || !host){
      window.location.href = "portal.html";
    }
  })();
</script>

<!-- CONFIDENTIAL TOP BANNER -->
<div class="confidential-banner">
  🔒 Confidential &nbsp;·&nbsp; KIMANZI by UrbanChill &nbsp;·&nbsp; For internal use only &nbsp;·&nbsp; Do not distribute
</div>

<!-- BACK TO PORTAL -->
<div style="background:var(--green);padding:.75rem 1.5rem;display:flex;align-items:center;gap:.75rem">
  <a href="portal.html" style="color:var(--orange);font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:.4rem">
    ‹ Back to portal
  </a>
</div>

<!-- CONTENT IS LOADED VIA AUTHENTICATED API CALL — never present in static page source -->
<div id="handbookLoading" style="text-align:center;padding:4rem 1.5rem;color:var(--muted);font-size:14px;">
  Loading handbook…
</div>

<div id="handbookContent" style="display:none;"></div>

<script>
  (async function(){
    const API = "https://api.urbanchill.org";
    const token = sessionStorage.getItem("kimanzi_token");
    if (!token) { window.location.href = "portal.html"; return; }

    try {
      const res = await fetch(API + "/api/host/handbook?token=" + encodeURIComponent(token));
      const data = await res.json();
      if (data.success && data.html) {
        document.getElementById("handbookContent").innerHTML = data.html;
        document.getElementById("handbookContent").style.display = "block";
        document.getElementById("handbookLoading").style.display = "none";
      } else {
        window.location.href = "portal.html";
      }
    } catch(e) {
      document.getElementById("handbookLoading").textContent = "Connection error. Please refresh, or go back to the portal.";
    }
  })();
</script>

</body>
</html>
