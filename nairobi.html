<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nairobi Practical Guide — KIMANZI</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=playfair-display:400,600,700|inter:300,400,500,600" rel="stylesheet">
  <style>
    :root {
      --green: #1A2C1E;
      --orange: #C87A2E;
      --cream: #F5EFE2;
      --cream2: #EDE4D4;
      --text: #2B1D12;
      --muted: #7a6a56;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      padding-bottom: 4rem;
    }
    header {
      background: var(--green);
      color: var(--cream);
      padding: 2rem 1.5rem 1.5rem;
    }
    header .logo { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; opacity: .6; margin-bottom: .5rem; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 600; }
    header p { opacity: .75; font-size: 13px; margin-top: .4rem; }
    .container { max-width: 680px; margin: 0 auto; padding: 0 1.25rem; }
    .section { margin-top: 2.5rem; }
    .section-title {
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--orange); font-weight: 700; margin-bottom: 1rem;
      border-bottom: 1px solid var(--cream2); padding-bottom: .4rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: .75rem;
      border: 1px solid var(--cream2);
    }
    .card-header { display: flex; align-items: center; gap: .6rem; margin-bottom: .5rem; }
    .card-icon { font-size: 1.3rem; }
    .card-title { font-weight: 600; font-size: 15px; }
    .card-body { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .card-body strong { color: var(--text); }
    .tag {
      display: inline-block; background: var(--cream2);
      border-radius: 999px; padding: .15rem .7rem;
      font-size: 11px; font-weight: 600; margin: .15rem .1rem;
      color: var(--text);
    }
    .tag.red { background: #fdecea; color: #c0392b; }
    .tag.green { background: #e8f0e9; color: #1A422E; }
    .emergency { background: #fdecea; border: 1px solid #f5c6c6; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: .75rem; }
    .emergency .num { font-size: 1.3rem; font-weight: 700; color: #c0392b; }
    .emergency .label { font-size: 12px; color: #7a6a56; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    @media (max-width: 500px) { .grid2 { grid-template-columns: 1fr; } }
    .back-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      color: var(--orange); font-size: 13px; font-weight: 600;
      text-decoration: none; margin: 1.25rem 0 0 1.25rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">KIMANZI · Host Guide</div>
  <h1>Nairobi Practical Guide</h1>
  <p>Everything you need to navigate Nairobi confidently.</p>
</header>

<a href="/portal.html" class="back-btn">← Back to portal</a>

<!-- ACCESS CHECK -->
<script>
  (function(){
    const token = sessionStorage.getItem("kimanzi_token");
    const host  = sessionStorage.getItem("kimanzi_host");
    if(!token || !host){
      window.location.href = "portal.html";
    }
  })();
</script>

<!-- CONTENT IS LOADED VIA AUTHENTICATED API CALL — never present in static page source -->
<div id="docLoading" style="text-align:center;padding:4rem 1.5rem;color:#7a6a56;font-size:14px;">
  Loading…
</div>

<div id="docContent" style="display:none;"></div>

<script>
  (async function(){
    const API = "https://cockpit.urbanchill.org";
    const token = sessionStorage.getItem("kimanzi_token");
    if (!token) { window.location.href = "portal.html"; return; }

    try {
      const res = await fetch(API + "/api/host/nairobi?token=" + encodeURIComponent(token));
      const data = await res.json();
      if (data.success && data.html) {
        document.getElementById("docContent").innerHTML = data.html;
        document.getElementById("docContent").style.display = "block";
        document.getElementById("docLoading").style.display = "none";
      } else {
        window.location.href = "portal.html";
      }
    } catch(e) {
      document.getElementById("docLoading").textContent = "Connection error. Please refresh, or go back to the portal.";
    }
  })();
</script>

</body>
</html>
